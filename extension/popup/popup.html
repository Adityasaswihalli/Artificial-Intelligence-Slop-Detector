<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Slop Detector</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 300px;
  background: #080c14;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: #f1f5f9;
  min-height: 400px;
}

.hd {
  background: linear-gradient(135deg,#0d1117,#1a1f2e);
  padding: 13px 15px;
  border-bottom: 1px solid rgba(239,68,68,0.22);
  display: flex; align-items: center; justify-content: space-between;
  position: relative; overflow: hidden;
}
.hd::after {
  content:''; position:absolute; top:-40px; right:-40px;
  width:110px; height:110px;
  background: radial-gradient(circle,rgba(239,68,68,0.12),transparent);
  border-radius:50%; pointer-events:none;
}
.logo { display:flex; align-items:center; gap:9px; }
.logo-icon {
  width:34px; height:34px;
  background: linear-gradient(135deg,#ef4444,#7f1d1d);
  border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:17px; flex-shrink:0;
  box-shadow: 0 4px 12px rgba(239,68,68,0.3);
}
.logo-name { font-size:11px; font-weight:800; letter-spacing:0.5px; }
.logo-tag  { font-size:8px; color:#475569; letter-spacing:1.5px; text-transform:uppercase; margin-top:1px; }

.tog-wrap { display:flex; align-items:center; gap:7px; }
.tog-lbl  { font-size:8px; color:#64748b; text-transform:uppercase; letter-spacing:1px; }
.tog {
  width:38px; height:20px; background:#1e2433;
  border-radius:10px; cursor:pointer; position:relative;
  transition:background 0.3s; border:1px solid rgba(255,255,255,0.08);
  flex-shrink:0;
}
.tog.on { background: linear-gradient(135deg,#ef4444,#dc2626); }
.tok {
  position:absolute; top:2px; left:2px;
  width:14px; height:14px; background:white; border-radius:50%;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 2px 5px rgba(0,0,0,0.4);
}
.tog.on .tok { transform:translateX(18px); }

.status {
  padding:6px 14px; font-size:9px; font-weight:600;
  display:flex; align-items:center; gap:6px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.status.on  { background:rgba(16,185,129,0.08); color:#10b981; }
.status.off { background:rgba(71,85,105,0.08);  color:#64748b; }
.sdot { width:5px; height:5px; border-radius:50%; background:currentColor; }
.status.on .sdot { animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.auth { padding:24px 18px; text-align:center; }
.auth-emoji { font-size:40px; margin-bottom:12px; }
.auth-h { font-size:14px; font-weight:700; margin-bottom:7px; }
.auth-p { font-size:11px; color:#64748b; line-height:1.6; margin-bottom:18px; }
.btn {
  width:100%; padding:10px; border-radius:9px; border:none;
  font-size:11px; font-weight:700; cursor:pointer;
  transition:all 0.2s; font-family:inherit; letter-spacing:0.3px;
}
.btn-r { background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff;
         box-shadow:0 4px 14px rgba(239,68,68,0.3); margin-bottom:7px; }
.btn-r:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(239,68,68,0.4); }
.btn-s { background:rgba(255,255,255,0.04); color:#64748b;
         border:1px solid rgba(255,255,255,0.08); }
.btn-s:hover { background:rgba(255,255,255,0.08); color:#94a3b8; }

.main { padding:11px; }

.ucard {
  background:rgba(26,31,46,0.8);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:11px; padding:11px;
  display:flex; align-items:center; gap:9px;
  margin-bottom:9px;
}
.uav {
  width:36px; height:36px; border-radius:50%;
  background:linear-gradient(135deg,#ef4444,#7f1d1d);
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:800; flex-shrink:0;
}
.uname  { font-size:11px; font-weight:700; }
.uemail { font-size:9px; color:#475569; margin-top:1px; }
.uplan  {
  margin-left:auto; padding:2px 7px;
  background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.25);
  border-radius:20px; font-size:8px; font-weight:800;
  color:#ef4444; text-transform:uppercase; letter-spacing:0.8px; flex-shrink:0;
}

.sgrid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:9px; }
.scard {
  background:rgba(26,31,46,0.8); border:1px solid rgba(255,255,255,0.07);
  border-radius:11px; padding:11px 9px; text-align:center;
}
.sval { font-size:20px; font-weight:900; font-family:'Courier New',monospace; }
.slbl { font-size:7.5px; color:#475569; text-transform:uppercase; letter-spacing:0.8px; margin-top:2px; }

.acts { display:flex; flex-direction:column; gap:5px; margin-bottom:9px; }
.abtn {
  display:flex; align-items:center; gap:9px;
  padding:9px 11px;
  background:rgba(26,31,46,0.8); border:1px solid rgba(255,255,255,0.07);
  border-radius:9px; cursor:pointer; transition:all 0.2s;
  color:#94a3b8; font-size:11px; font-weight:600;
  width:100%; text-align:left; outline:none; font-family:inherit;
}
.abtn:hover {
  background:rgba(239,68,68,0.08); border-color:rgba(239,68,68,0.2); color:#f1f5f9;
}
.aico { font-size:15px; flex-shrink:0; }
.ach  { margin-left:auto; color:#475569; font-size:11px; }

.force-btn {
  width:100%; padding:10px;
  background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(127,29,29,0.25));
  border:1px solid rgba(239,68,68,0.35);
  border-radius:9px; cursor:pointer; transition:all 0.2s;
  color:#ef4444; font-size:10px; font-weight:800;
  font-family:inherit; letter-spacing:0.5px; text-transform:uppercase;
  margin-bottom:9px; outline:none;
}
.force-btn:hover {
  background:linear-gradient(135deg,rgba(239,68,68,0.28),rgba(127,29,29,0.4));
  border-color:rgba(239,68,68,0.6);
  box-shadow:0 4px 16px rgba(239,68,68,0.25);
  transform:translateY(-1px);
}
.force-btn:active { transform:scale(0.98); }
.force-btn.scanning {
  background: rgba(99,102,241,0.15) !important;
  border-color: rgba(99,102,241,0.4) !important;
  color: #818cf8 !important;
  animation: fspin 1s linear infinite;
}
@keyframes fspin { 0%,100%{opacity:1} 50%{opacity:0.5} }

.plats {
  background:rgba(26,31,46,0.8); border:1px solid rgba(255,255,255,0.07);
  border-radius:11px; padding:9px 11px; margin-bottom:9px;
}
.plats-title {
  font-size:7.5px; color:#475569; text-transform:uppercase;
  letter-spacing:1.5px; margin-bottom:7px; font-weight:700;
}
.prow {
  display:flex; align-items:center; justify-content:space-between;
  padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.04);
}
.prow:last-child { border-bottom:none; }
.pname { font-size:10px; color:#94a3b8; display:flex; align-items:center; gap:5px; }
.mt {
  width:30px; height:16px; background:#1e2433; border-radius:8px;
  position:relative; cursor:pointer;
  border:1px solid rgba(255,255,255,0.06); transition:background 0.3s; flex-shrink:0;
}
.mt.on { background:linear-gradient(135deg,#ef4444,#dc2626); }
.mk {
  position:absolute; top:1px; left:1px;
  width:12px; height:12px; background:white; border-radius:50%;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 1px 4px rgba(0,0,0,0.4);
}
.mt.on .mk { transform:translateX(14px); }

.frow { display:flex; gap:5px; }
.fbtn {
  flex:1; padding:7px; background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07); border-radius:7px;
  cursor:pointer; font-size:8.5px; color:#64748b;
  text-align:center; transition:all 0.2s; font-family:inherit; font-weight:600;
}
.fbtn:hover { background:rgba(255,255,255,0.07); color:#94a3b8; }
.fbtn.d:hover { background:rgba(239,68,68,0.1); color:#ef4444; border-color:rgba(239,68,68,0.2); }

.ldg {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:40px; gap:10px;
}
.spin {
  width:26px; height:26px; border:2.5px solid rgba(239,68,68,0.2);
  border-top-color:#ef4444; border-radius:50%; animation:sp 0.8s linear infinite;
}
@keyframes sp { to{transform:rotate(360deg)} }
.ldg-t { font-size:9px; color:#475569; letter-spacing:1px; text-transform:uppercase; }

.scan-hint { text-align:center; font-size:8px; color:#334155; padding:3px 0; }
</style>
</head>
<body>
<div id="root">
  <div class="ldg">
    <div class="spin"></div>
    <div class="ldg-t">Loading...</div>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
