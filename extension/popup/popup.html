<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Slop Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: #080c14;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f1f5f9;
      overflow: hidden;
    }

    /* ---- Header ---- */
    .header {
      background: linear-gradient(135deg, #0d1117, #1a1f2e);
      padding: 14px 16px;
      border-bottom: 1px solid rgba(239,68,68,0.2);
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(239,68,68,0.12), transparent);
      border-radius: 50%;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #ef4444, #7f1d1d);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(239,68,68,0.3);
      flex-shrink: 0;
    }
    .logo-name { font-size: 12px; font-weight: 800; letter-spacing: 0.5px; color: #f1f5f9; }
    .logo-sub  { font-size: 9px; color: #475569; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; }

    /* Toggle */
    .toggle-group { display: flex; align-items: center; gap: 8px; }
    .toggle-label { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    .toggle {
      width: 40px; height: 22px;
      background: #1e2433;
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      transition: background 0.3s;
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .toggle.on { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .toggle-knob {
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .toggle.on .toggle-knob { transform: translateX(18px); }

    /* Status bar */
    .status-bar {
      padding: 7px 16px;
      display: flex; align-items: center; gap: 7px;
      font-size: 10px; font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s;
    }
    .status-bar.active   { background: rgba(16,185,129,0.08); color: #10b981; border-color: rgba(16,185,129,0.15); }
    .status-bar.inactive { background: rgba(100,116,139,0.08); color: #64748b; }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
    }
    .status-bar.active .status-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ---- Auth screen ---- */
    .auth-screen {
      padding: 28px 20px;
      text-align: center;
    }
    .auth-icon { font-size: 44px; margin-bottom: 14px; }
    .auth-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .auth-sub { font-size: 11px; color: #64748b; margin-bottom: 20px; line-height: 1.6; }
    .btn {
      width: 100%; padding: 11px;
      border-radius: 10px; border: none;
      font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.3px;
      font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 4px 16px rgba(239,68,68,0.3);
      margin-bottom: 8px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(239,68,68,0.4); }
    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: #64748b;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); color: #94a3b8; }

    /* ---- Main screen ---- */
    .main-screen { padding: 12px; }

    .user-card {
      background: rgba(26,31,46,0.7);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .user-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #ef4444, #7f1d1d);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; flex-shrink: 0;
    }
    .user-name  { font-size: 12px; font-weight: 700; }
    .user-email { font-size: 10px; color: #475569; margin-top: 1px; }
    .user-plan  {
      margin-left: auto;
      padding: 2px 8px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 20px;
      font-size: 8px; font-weight: 800;
      color: #ef4444; text-transform: uppercase;
      letter-spacing: 1px; flex-shrink: 0;
    }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .stat-card {
      background: rgba(26,31,46,0.7);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px 10px; text-align: center;
    }
    .stat-val { font-size: 22px; font-weight: 900; font-family: 'Courier New', monospace; }
    .stat-lbl { font-size: 8px; color: #475569; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }

    /* Action buttons */
    .actions { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .action-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: rgba(26,31,46,0.7);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      cursor: pointer; transition: all 0.2s;
      color: #94a3b8; font-size: 11px; font-weight: 600;
      width: 100%; text-align: left; outline: none;
      font-family: inherit;
    }
    .action-btn:hover {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.2);
      color: #f1f5f9;
    }
    .action-icon { font-size: 16px; flex-shrink: 0; }
    .action-chevron { margin-left: auto; color: #475569; font-size: 12px; }

    /* Platform toggles */
    .platforms {
      background: rgba(26,31,46,0.7);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 10px 12px;
      margin-bottom: 10px;
    }
    .platforms-title {
      font-size: 8px; color: #475569;
      text-transform: uppercase; letter-spacing: 1.5px;
      margin-bottom: 8px; font-weight: 700;
    }
    .plat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .plat-row:last-child { border-bottom: none; }
    .plat-name { font-size: 11px; color: #94a3b8; display: flex; align-items: center; gap: 6px; }
    .mini-toggle {
      width: 32px; height: 17px; background: #1e2433;
      border-radius: 9px; position: relative; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.06);
      transition: background 0.3s; flex-shrink: 0;
    }
    .mini-toggle.on { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .mini-knob {
      position: absolute; top: 1px; left: 1px;
      width: 13px; height: 13px; background: white;
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .mini-toggle.on .mini-knob { transform: translateX(15px); }

    /* Footer row */
    .footer-row { display: flex; gap: 6px; }
    .footer-btn {
      flex: 1; padding: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; cursor: pointer;
      font-size: 9px; color: #64748b;
      text-align: center; transition: all 0.2s;
      font-family: inherit; font-weight: 600;
      letter-spacing: 0.3px;
    }
    .footer-btn:hover { background: rgba(255,255,255,0.07); color: #94a3b8; }
    .footer-btn.danger:hover {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      border-color: rgba(239,68,68,0.2);
    }

    /* Loading */
    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; flex-direction: column; gap: 10px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(239,68,68,0.2);
      border-top-color: #ef4444;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 10px; color: #475569; letter-spacing: 1px; text-transform: uppercase; }

    /* Scan indicator */
    .scan-info {
      text-align: center;
      font-size: 9px; color: #334155;
      padding: 4px 0 2px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading...</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
